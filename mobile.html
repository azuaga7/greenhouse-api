    .mobile-dashboard-container {

      position: relative;
      margin: 20px auto;
      display: flex;
      flex-direction: column;

      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .mobile-header-title {

      align-items: center;
      gap: 12px;
      color: #f8fafc;
      font-size: 16px;
      font-weight: 700;
    }
    
    .mobile-tab-header {
      background: rgba(255,255,255,0.05);

      justify-content: space-between;

    .mobile-tab-name {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .mobile-tab-icons {

      gap: 8px;

    .mobile-tab-icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      display: flex;

      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;

    .mobile-widget-title {
      color: #f8fafc;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .mobile-widget-key {
      color: #94a3b8;
      font-size: 9px;
      font-family: monospace;
    }
    
    .mobile-widget-value {
      color: #38bdf8;
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    
    .mobile-widget-unit {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 400;
    }
    
    .mobile-gauge-bar {

      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    
    .mobile-gauge-fill {

    }
    
    .mobile-status-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 10px;

    .mobile-status-chip.on {

      color: #64748b;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }
    
    .mobile-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      min-height: 120px;
    }
    
    .section-label {
      background: transparent !important;
      border: none !important;
      color: #38bdf8 !important;
    }
    
    /* Responsive para pantallas más pequeñas */
    @media (max-width: 400px) {
      .mobile-dashboard-container {
        width: 100%;
        height: 100vh;
        border-radius: 0;
        border: none;
        margin: 0;

// --- Mobile Dashboard App ---
const MobileDashboardApp = () => {
    const [lastData, setLastData] = useState({});
    const [BASE_URL] = useState(CONFIG.BASE_URL || "");

    // --- Normalización global (API flat sin kv.) ---
// Quita "kv." si existe
const normKey = (k) => (typeof k === 'string' && k.startsWith('kv.')) ? k.slice(3) : k;
// Lee valor tolerante: primero key limpia, luego prueba "kv."+key por compat
const getVal = (obj, key) => {
    if (!obj || !key) return undefined;
    const nk = normKey(key);
    if (obj[nk] !== undefined) return obj[nk];
    const legacy = 'kv.' + nk;
    if (obj[legacy] !== undefined) return obj[legacy];
    return undefined;
};

// --- Normalización de fila (EXACTAMENTE como Desktop) ---
const normalizeRow = (raw) => {
    if (!raw || typeof raw !== 'object') return raw;
    const src = (raw.kv && typeof raw.kv === 'object') ? raw.kv : raw;
    const out = {};
    if (raw.timestamp) out.timestamp = raw.timestamp;
    for (const k in src) {
        if (k === 'timestamp') continue;
        out[normKey(k)] = src[k];
    }
    if (!out.timestamp) out.timestamp = new Date().toISOString();
    return out;
};

    // Initialize polling - EXACTAMENTE como Desktop
    useEffect(() => {
        fetchUpdate();
        const interval = setInterval(fetchUpdate, 1000);
        return () => clearInterval(interval);
    }, [BASE_URL]);

    // Fetch update - EXACTAMENTE como Desktop
    const fetchUpdate = async () => {
        try {
            const response = await fetch(BASE_URL + '/api/last');
            if (!response.ok) throw new Error("API Offline");
            
            const raw = await response.json();
            // Nuevo: normalizar live a flat sin kv. (EXACTAMENTE como Desktop)
            const flat = normalizeRow(raw);
            const normalizedLive = flat;
            
            // Validar que la data es real (EXACTAMENTE como Desktop)
            const hasData = flat && flat.timestamp && flat.timestamp !== '--';
            if (hasData) {
                setLastData(flat);  // ← Usa datos normalizados como Desktop
            }
        } catch (error) {
            console.error('Error fetching data:', error);
        }
    };

    // Get widget value
    const getWidgetValue = (key) => {
        if (!key || key === 'sin_key') return '--';
        const val = getVal(lastData, key);
        if (val === undefined || val === null) return '--';
        return String(val);
    };

    // Format value
    const formatValue = (val, format, unit) => {
        if (val === '--' || val === undefined || val === null) return '--';
        
        let num = parseFloat(val);
        let isNum = !isNaN(num);
        
        if (format === 'bool_onoff') {
            const isTrue = val === true || val === 1 || val === '1' || val === '1.00' || 
                           String(val).toUpperCase() === 'ON' || String(val).toUpperCase() === 'TRUE' || 
                           String(val).toUpperCase() === 'ACTIVO';
            return isTrue ? 'ON' : 'OFF';
        }

        if (format === 'percent') {
            if (!isNum) return "--";
            return num.toFixed(0) + "%";
        }

        if (isNum && typeof val === 'number') {
            return num.toFixed(1) + unit;
        }
        
        return val + unit;
    };

                    ])
                ]);
        }
    };

    // Filter widgets for current tab - EXACTAMENTE como Desktop
    const currentTab = (CONFIG.dashboard.tabs || [])[0];  // Primer tab por defecto
    const currentTabWidgets = (CONFIG.dashboard.widgets || []).filter(w => 
        String(w.tabId) === String(currentTab?.id || '1')
    );

    // Debug: Log para verificar widgets
    console.log('Mobile Dashboard - Total widgets:', CONFIG.dashboard.widgets?.length || 0);
    console.log('Mobile Dashboard - Current tab widgets:', currentTabWidgets.length);
    console.log('Mobile Dashboard - Current tab:', currentTab);
    console.log('Mobile Dashboard - Last data keys:', Object.keys(lastData));
    console.log('Mobile Dashboard - Sample last data:', lastData);
    
    // Debug: Mostrar algunos widget keys
    if (currentTabWidgets.length > 0) {
        console.log('Mobile Dashboard - Widget keys:', currentTabWidgets.slice(0, 3).map(w => w.key));
        console.log('Mobile Dashboard - Sample widget values:', currentTabWidgets.slice(0, 3).map(w => ({
            key: w.key,
            value: getWidgetValue(w.key),
            label: w.label
        })));
    }

    return React.createElement('div', {
        className: 'adtec-mobile-dashboard-root',
        style: {
            padding: '10px',
            minHeight: '100vh'
        }
    }, [
        // Mobile Card Container
        React.createElement('div', {
            className: 'adtec-mobile-card',
            style: {
                width: '375px',
                height: '812px',
                margin: '20px auto',
                borderRadius: '40px',
                border: '12px solid #2a2a2a',
                boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
                overflow: 'hidden',
                position: 'relative',
                display: 'flex',
                flexDirection: 'column'
            }
        }, [
            // Header
            React.createElement('div', {
                className: 'mobile-card-header'
            }, [
                React.createElement('div', {
                    className: 'mobile-logo-section'
                }, [
                    React.createElement('div', {
                        className: 'mobile-logo-icon'
                    }, React.createElement('div', {
                        className: 'mobile-logo-icon-inner'
                    }, 'ADTEC')),
                    React.createElement('h3', {
                        className: 'mobile-card-title',
                        style: { margin: 0, fontSize: '16px' }
                    }, 'Mobile Dashboard')
                ])
            ]),

            // Tab Navigation
            React.createElement('div', {
                className: 'mobile-tabs-nav'
            }, [
                React.createElement('div', {
                    className: 'mobile-tab-title'
                }, currentTab?.name || 'Dashboard'),
                React.createElement('div', {
                    className: 'mobile-tab-icons'
                }, (CONFIG.dashboard.tabs || []).map((tab) => 
                    React.createElement('div', {
                        key: tab.id,
                        className: 'mobile-tab-btn',
                        style: {
                            width: '32px',
                            height: '32px',
                            padding: '0',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            fontSize: '16px'
                        }
                    }, tab.icon || '📊')
                ))
            ]),

            // Main Content Area
            React.createElement('div', {
                className: 'mobile-card-body',
                style: {
                    flex: 1,
                    position: 'relative',
                    overflow: 'hidden'
                }
            }, React.createElement('div', {
                className: 'mobile-grid-bg'
            }, React.createElement('div', {
                className: 'mobile-widgets-area'
            }, currentTabWidgets.map((widget) => 
                React.createElement('div', {
                    key: widget.id,
                    className: 'mobile-status-item ' + (widget.width === 2 ? 'mobile-widget-span-2' : '') + ' ' + (widget.height === 2 ? 'mobile-widget-row-span-2' : ''),
                    style: {
                        position: 'relative',
                        padding: '12px'
                    }
                }, renderMobileWidget(widget))
            ))))
        ])
    ]);
};

// Inicialización
const root = document.getElementById('mobile-root');
if (root) {
    ReactDOM.render(React.createElement(MobileDashboardApp), root);
    console.log("✅ Mobile Dashboard cargado exitosamente.");
} else {
    console.error("❌ No se encontró el elemento #mobile-root");
}

            
            // Inicializar iconos después de que React termine
            setTimeout(() => { 
              if(window.lucide) lucide.createIcons(); 
            }, 500);
            
            console.log("✅ ADTEC Mobile Dashboard: Renderizado exitoso.");
        } catch (err) {
            console.error("❌ Error Crítico Mobile Dashboard:", err);
            document.getElementById('error-fallback').style.display = 'block';
            document.getElementById('error-details').innerText = err.stack || err.message;
        }
    </script>
</body>

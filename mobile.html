    /* Estilos Mobile Dashboard */
    .mobile-dashboard-container {
      width: 375px;
      height: 812px;
      background: #1a1a1a;
      border-radius: 40px;
      border: 12px solid #2a2a2a;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      position: relative;
      margin: 20px auto;
      display: flex;
      flex-direction: column;
    }
    
    .mobile-header {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .mobile-header-title {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #f8fafc;
      font-size: 16px;
      font-weight: 700;
    }
    
    .mobile-tab-header {
      background: rgba(255,255,255,0.05);
      padding: 8px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);

    .mobile-tab-name {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .mobile-tab-icons {
      display: flex;
      gap: 8px;
    }
    
    .mobile-tab-icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;

      height: 100%;

      background: rgba(56, 189, 248, 0.1);
    }
    
    .mobile-widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .mobile-widget-title {
      color: #f8fafc;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .mobile-widget-key {
      color: #94a3b8;
      font-size: 9px;
      font-family: monospace;
    }
    
    .mobile-widget-value {
      color: #38bdf8;
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    
    .mobile-widget-unit {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 400;
    }
    
    .mobile-gauge-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    
    .mobile-gauge-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    
    .mobile-status-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
    }
    
    .mobile-status-chip.on {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    
    .mobile-status-chip.off {
      background: rgba(148, 163, 184, 0.2);
      color: #64748b;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }
    
    .mobile-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    
    .mobile-chart-container {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      min-height: 120px;
    }
    
    .mobile-alerts-container {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      min-height: 120px;
    }
    
    .section-label {
      background: transparent !important;
      border: none !important;
      color: #38bdf8 !important;
    }
    
    /* Responsive para pantallas más pequeñas */
    @media (max-width: 400px) {
      .mobile-dashboard-container {
        width: 100%;
        height: 100vh;
        border-radius: 0;
        border: none;
        margin: 0;
      }

const MobileDashboardApp = () => {
    const [lastData, setLastData] = useState({});
    const [BASE_URL] = useState(CONFIG.BASE_URL || "");

    // Fetch data from API
    const fetchUpdate = async () => {
        try {
            const response = await fetch(BASE_URL + '/api/data');
            if (response.ok) {
                const data = await response.json();
                setLastData(data);
            }
        } catch (error) {
            console.warn("Error fetching data:", error);
        }
    };

    // Initialize polling
    useEffect(() => {
        fetchUpdate();
        const interval = setInterval(fetchUpdate, 1000);
        return () => clearInterval(interval);
    }, [BASE_URL]);

    // Get widget value
    const getWidgetValue = (key) => {
        if (!key || key === 'sin_key') return '--';
        const val = lastData && lastData[key];
        if (val === undefined || val === null) return '--';
        return String(val);
    };

    // Format value
    const formatValue = (val, format, unit) => {
        if (val === '--' || val === undefined || val === null) return '--';
        
        let num = parseFloat(val);
        let isNum = !isNaN(num);
        
        if (format === 'bool_onoff') {
            const isTrue = val === true || val === 1 || val === '1' || val === '1.00' || 
                           String(val).toUpperCase() === 'ON' || String(val).toUpperCase() === 'TRUE' || 
                           String(val).toUpperCase() === 'ACTIVO';
            return isTrue ? 'ON' : 'OFF';
        }

        if (format === 'percent') {
            if (!isNum) return "--";
            return num.toFixed(0) + "%";
        }

        if (isNum && typeof val === 'number') {
            return num.toFixed(1) + unit;
        }
        
        return val + unit;
    };

                    style: {
                        background: 'rgba(255,255,255,0.02)',
                        border: '1px solid rgba(255,255,255,0.1)',
                        borderRadius: 8,
                        padding: 12,
                        display: 'flex',
                        flexDirection: 'column',
                        minHeight: 80
                    }
                }, [
                    React.createElement('div', {
                        style: {
                            display: 'flex',
                            justifyContent: 'space-between',
                            alignItems: 'center',
                            marginBottom: 8
                        }
                    }, [
                        React.createElement('div', {
                            style: {
                                color: '#f8fafc',
                                fontSize: 11,
                                fontWeight: 600,
                                textTransform: 'uppercase',
                                letterSpacing: 0.5
                            }
                        }, w.label),
                        React.createElement('div', {
                            style: {
                                color: '#94a3b8',
                                fontSize: 9,
                                fontFamily: 'monospace'
                            }
                        }, w.key)
                    ]),
                    React.createElement('div', {
                        style: {
                            color: '#38bdf8',
                            fontSize: 18,
                            fontWeight: 700
                        }
                    }, valStr)
                ]);
        }
    };

    // Filter widgets for current tab
    const currentTabWidgets = (CONFIG.dashboard.widgets || []).filter(w => {
        const firstTabId = (CONFIG.dashboard.tabs || [])[0]?.id || '0';
        return w.tabId === '0' || (!w.tabId && firstTabId === '0');
    });

    const currentTab = (CONFIG.dashboard.tabs || [])[0];

    return React.createElement('div', {
        className: 'mobile-dashboard-container',
        style: {
            width: 375,
            height: 812,
            background: '#1a1a1a',
            borderRadius: 40,
            border: '12px solid #2a2a2a',
            boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
            overflow: 'hidden',
            position: 'relative',
            margin: '20px auto',
            display: 'flex',
            flexDirection: 'column'
        }
    }, [
        // Header
        React.createElement('div', {
            style: {
                background: 'linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%)',
                padding: '12px 20px',
                borderBottom: '1px solid rgba(255,255,255,0.1)',
                display: 'flex',
                justifyContent: 'space-between',
                alignItems: 'center'
            }
        }, [
            React.createElement('div', {
                style: {
                    display: 'flex',
                    alignItems: 'center',
                    gap: 12,
                    color: '#f8fafc',
                    fontSize: 16,
                    fontWeight: 700
                }
            }, [
                React.createElement('div', {
                    style: {
                        width: 24,
                        height: 24,
                        borderRadius: 6,
                        background: '#facc15'
                    }
                }, React.createElement('div', {
                    style: {
                        fontSize: 8,
                        color: '#000',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center'
                    }
                }, 'ADTEC')),
                React.createElement('h3', {
                    style: { margin: 0, color: '#f8fafc', fontSize: 16 }
                }, 'Mobile Dashboard')
            ])
        ]),

        // Tab Navigation
        React.createElement('div', {
            style: {
                background: 'rgba(255,255,255,0.05)',
                padding: '8px 20px',
                display: 'flex',
                justifyContent: 'space-between',
                alignItems: 'center',
                borderBottom: '1px solid rgba(255,255,255,0.1)'
            }
        }, [
            React.createElement('div', {
                style: {
                    color: '#94a3b8',
                    fontSize: 12,
                    fontWeight: 600,
                    textTransform: 'uppercase',
                    letterSpacing: 1
                }
            }, currentTab?.name || 'Dashboard'),
            React.createElement('div', {
                style: {
                    display: 'flex',
                    gap: 8
                }
            }, (CONFIG.dashboard.tabs || []).map((tab) => 
                React.createElement('div', {
                    key: tab.id,
                    style: {
                        width: 32,
                        height: 32,
                        background: 'rgba(255,255,255,0.1)',
                        borderRadius: 8,
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        cursor: 'pointer',
                        fontSize: 16
                    }
                }, tab.icon || '📊')
            ))
        ]),

        // Main Content Area
        React.createElement('div', {
            style: {
                flex: 1,
                display: 'flex',
                position: 'relative',
                overflow: 'hidden'
            }
        }, React.createElement('div', {
            style: {
                flex: 1,
                background: '#0f0f0f',
                padding: 16,
                overflow: 'hidden'
            }
        }, React.createElement('div', {
            style: {
                width: '100%',
                height: '100%',
                background: '#000',
                borderRadius: 20,
                padding: 16,
                overflow: 'hidden'
            }
        }, React.createElement('div', {
            style: {
                display: 'grid',
                gridTemplateColumns: '1fr 1fr',
                gap: 12,
                height: '100%',
                overflowY: 'auto'
            }
        }, currentTabWidgets.map((widget) => 
            React.createElement('div', {
                key: widget.id,
                style: {
                    gridColumn: widget.width === 2 ? 'span 2' : 'span 1',
                    gridRow: widget.height === 2 ? 'span 2' : 'span 1',
                    border: '1px solid rgba(255,255,255,0.1)',
                    borderRadius: 8,
                    padding: 8,
                    background: 'rgba(255,255,255,0.02)',
                    cursor: 'pointer'
                }
            }, renderMobileWidget(widget))
        )))))
    ]);
};

// Inicialización
const root = document.getElementById('mobile-root');
if (root) {
    ReactDOM.render(React.createElement(MobileDashboardApp), root);
    console.log("✅ Mobile Dashboard cargado exitosamente.");
} else {
    console.error("❌ No se encontró el elemento #mobile-root");
}

            
            // Inicializar iconos después de que React termine
            setTimeout(() => { 
              if(window.lucide) lucide.createIcons(); 
            }, 500);
            
            console.log("✅ ADTEC Mobile Dashboard: Renderizado exitoso.");
        } catch (err) {
            console.error("❌ Error Crítico Mobile Dashboard:", err);
            document.getElementById('error-fallback').style.display = 'block';
            document.getElementById('error-details').innerText = err.stack || err.message;
        }
    </script>
